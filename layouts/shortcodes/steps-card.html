{{ $title := .Get "title" | default "操作步骤" }}
{{ $step := .Get "step" | default "1" }}
{{ $tip := .Get "tip" | default "" }}
<div class="my-5 rounded-lg border border-neutral-300 dark:border-neutral-700 p-4">
  <div class="mb-2 flex items-center gap-2">
    <span class="inline-flex h-7 min-w-7 items-center justify-center rounded-full bg-primary-600 px-2 text-sm font-semibold text-white">{{ $step }}</span>
    <strong>{{ $title }}</strong>
  </div>
  <div class="text-sm">
    {{ .Inner | markdownify }}
  </div>
  {{ if $tip }}
    <p class="mt-3 text-xs text-neutral-600 dark:text-neutral-300">提示：{{ $tip }}</p>
  {{ end }}
</div>

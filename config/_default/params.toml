# chatgptnews = 蓝色调
# guideclean = 绿色调
colorScheme = "guideclean"
defaultAppearance = "light"
autoSwitchAppearance = false

defaultSocialImage = "images/og-default.webp"


enableA11y = false
enableSearch = true
enableCodeCopy = true
enableStructuredBreadcrumbs = true
smartTOC = true
smartTOCHideUnfocusedChildren = false
replyByEmail = false
mainSections = ["articles"]

disableImageOptimization = false
disableImageOptimizationMD = false
disableTextInHeader = false
hotlinkFeatureImage = true

fingerprintAlgorithm = "sha512"

[header]
layout = "basic"

[footer]
showMenu = false
showCopyright = true
showThemeAttribution = false
showAppearanceSwitcher = false
showScrollToTop = true

[homepage]
layout = "hero"
homepageImage = ""
showRecent = true
showRecentItems = 6
cardView = true
cardViewScreenWidth = false

[article]
showDate = true
showViews = false
showLikes = false
showDateOnlyInArticle = false
showDateUpdated = true
showAuthor = false
showHero = true
heroStyle = "basic"
showBreadcrumbs = true
showDraftLabel = false
showEdit = false
editAppendPath = true
seriesOpened = false
showHeadingAnchors = true
showPagination = false
invertPagination = false
showReadingTime = true
showTableOfContents = true
showTaxonomies = true
showCategoryOnly = false
showAuthorsBadges = false
showWordCount = false
showZenMode = false
sharingLinks = [
  "facebook",
  "twitter",
  "linkedin",
  "reddit",
  "telegram",
  "whatsapp",
  "line",
  "email",
]

[list]
showHero = true
showBreadcrumbs = true
showSummary = true
showViews = false
showLikes = false
showTableOfContents = true
showCards = true
orderByWeight = false
groupByYear = true
cardView = true
cardViewScreenWidth = false
constrainItemsWidth = true

[sitemap]
excludedKinds = []


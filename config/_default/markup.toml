[goldmark]
  [goldmark.parser]
    wrapStandAloneImageWithinParagraph = false

    [goldmark.parser.attribute]
      block = true

  [goldmark.renderer]
    unsafe = true

[highlight]
  noClasses = false
  lineNos = true
  lineNumbersInTable = false
  codeFences = true
  guessSyntax = true
  style = "github-dark"

[tableOfContents]
  startLevel = 2
  endLevel = 4
